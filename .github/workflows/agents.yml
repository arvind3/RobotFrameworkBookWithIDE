name: Agent Pipelines

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  agents:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent:
          - research
          - writer
          - reviewer
          - editor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.agent }} agent
        run: npm run agent:${{ matrix.agent }}

      - name: Upload agent artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.agent }}-report
          path: |
            reports
            docs/_meta/research-knowledge-base.json
