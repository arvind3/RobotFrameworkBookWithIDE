name: CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Run agent pipelines
        run: npm run agents:run

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Validate analytics contract (config)
        run: python3 tools/analytics/validate_config.py --config analytics/analytics.config.json --output artifacts/ga4-contract-report.json

      - name: Build
        run: npm run build

      - name: Validate analytics contract (built site)
        run: python3 tools/analytics/validate_config.py --config analytics/analytics.config.json --site-dir build --output artifacts/ga4-contract-report-build.json

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload agent reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-reports
          path: |
            reports
            docs/_meta/research-knowledge-base.json

      - name: Upload analytics contract artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analytics-contract-reports
          path: artifacts/ga4-contract-report*.json
